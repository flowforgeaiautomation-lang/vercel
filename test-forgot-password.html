<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRIVEON - Forgot Password Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    h1 { font-size: 24px; margin-bottom: 8px; color: #ffd700; }
    p { font-size: 14px; color: #888; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 14px; margin-bottom: 8px; color: #ccc; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #333;
      background: #0f0f0f;
      color: white;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #ffd700; }
    input.error { border-color: #ff4444; }
    .form-error { color: #ff4444; font-size: 12px; margin-top: 4px; }
    .form-actions { display: flex; gap: 12px; margin-top: 24px; }
    button {
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      flex: 1;
    }
    button.cancel { background: #333; color: white; }
    button.save { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .success {
      text-align: center;
      padding: 24px 0;
    }
    .success svg {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      color: #00d4aa;
    }
    .success h4 { font-size: 20px; color: #00d4aa; margin-bottom: 8px; }
    .success p { font-size: 14px; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <div id="content"></div>
  </div>

  <script>
    let state = {
      step: 'form', // 'form' or 'success'
      email: '',
      newPassword: '',
      confirmPassword: '',
      showNewPassword: false,
      showConfirmPassword: false,
      errors: {},
      loading: false
    };

    function render() {
      const content = document.getElementById('content');
      
      if (state.step === 'success') {
        content.innerHTML = `
          <div class="success">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            <h4>Password Updated Successfully</h4>
            <p>You can now log in with your new password.</p>
          </div>
        `;
        
        setTimeout(() => {
          state.step = 'form';
          state.email = '';
          state.newPassword = '';
          state.confirmPassword = '';
          state.errors = {};
          render();
        }, 3000);
        return;
      }
      
      content.innerHTML = `
        <h1>Forgot Password</h1>
        <p>Reset your password instantly.</p>
        
        <form id="forgot-form">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" value="${state.email}" class="${state.errors.email ? 'error' : ''}">
            ${state.errors.email ? `<p class="form-error">${state.errors.email}</p>` : ''}
          </div>
          
          <div class="form-group">
            <label>New Password</label>
            <input type="${state.showNewPassword ? 'text' : 'password'}" id="new-password" value="${state.newPassword}" class="${state.errors.newPassword ? 'error' : ''}">
            ${state.errors.newPassword ? `<p class="form-error">${state.errors.newPassword}</p>` : ''}
          </div>
          
          <div class="form-group">
            <label>Confirm New Password</label>
            <input type="${state.showConfirmPassword ? 'text' : 'password'}" id="confirm-password" value="${state.confirmPassword}" class="${state.errors.confirmPassword ? 'error' : ''}">
            ${state.errors.confirmPassword ? `<p class="form-error">${state.errors.confirmPassword}</p>` : ''}
          </div>
          
          <div class="form-actions">
            <button type="button" class="cancel" id="cancel-btn">Cancel</button>
            <button type="submit" class="save" id="reset-btn" ${state.loading ? 'disabled' : ''}>
              ${state.loading ? 'Resetting...' : 'Reset Password'}
            </button>
          </div>
        </form>
      `;

      document.getElementById('email').addEventListener('input', e => state.email = e.target.value);
      document.getElementById('new-password').addEventListener('input', e => state.newPassword = e.target.value);
      document.getElementById('confirm-password').addEventListener('input', e => state.confirmPassword = e.target.value);
      document.getElementById('cancel-btn').addEventListener('click', () => {
        alert('Cancel clicked!');
      });
      document.getElementById('forgot-form').addEventListener('submit', handleForgotPassword);
    }

    function handleForgotPassword(e) {
      e.preventDefault();
      state.errors = {};

      if (!state.email.trim()) {
        state.errors.email = 'Enter your email.';
        render();
        return;
      }
      if (!/\\S+@\\S+\\.\\S+/.test(state.email)) {
        state.errors.email = 'Invalid email address.';
        render();
        return;
      }
      if (state.newPassword.length < 6) {
        state.errors.newPassword = 'Password must be at least 6 characters.';
        render();
        return;
      }
      if (state.newPassword !== state.confirmPassword) {
        state.errors.confirmPassword = 'Passwords do not match.';
        render();
        return;
      }

      state.loading = true;
      render();

      setTimeout(() => {
        localStorage.setItem('triveon-email', state.email);
        localStorage.setItem('triveon-password', state.newPassword);
        console.log('Saved email and password to localStorage');
        console.log('Email:', state.email);
        console.log('New password:', state.newPassword);
        
        state.loading = false;
        state.step = 'success';
        render();
      }, 800);
    }

    render();
  </script>
</body>
</html>
